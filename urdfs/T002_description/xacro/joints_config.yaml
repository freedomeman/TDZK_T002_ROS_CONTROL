# T002 Neck Joint → Motor Mapping (双电机)
joints:
  - name: yaw
    motor_id: 3          # DM电机: 命令CAN ID=0x03
    interface: can0
    interface_type: can
    motor_type: DM
    motor_model: 0        # 0=DM4340P_48V, 1=DM10010L_48V
    master_id_offset: 1   # 3+1=4, 回调监听反馈CAN ID=0x004
    direction: 1.0
    zero_offset: 0.0

  - name: pitch
    motor_id: 1          # STW电机: Dev_addr=1
    interface: can0
    interface_type: can
    motor_type: STW
    motor_model: 0        # STW_GIM_DEFAULT
    master_id_offset: 0   # 回调监听 motor_id=1
    direction: 1.0
    zero_offset: 0.0

  - name: roll
    motor_id: 2          # STW电机: Dev_addr=1
    interface: can0
    interface_type: can
    motor_type: STW
    motor_model: 0        # STW_GIM_DEFAULT
    master_id_offset: 0   # 回调监听 motor_id=1
    direction: 1.0
    zero_offset: 0.0
